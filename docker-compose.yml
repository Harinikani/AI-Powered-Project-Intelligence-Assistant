services:
  backend:
    build:
      context: ./backend
    container_name: appia-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/my_vector_db:/app/my_vector_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: appia-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
